<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Equilibrio</title>

  <meta name="theme-color" content="#0A84FF" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Equilibrio" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/logo.png" />
  <link rel="stylesheet" href="./style.css?v=2" />
</head>

<body>
  <main class="app-shell">

    <section id="screen-login" class="screen active">
      <div class="brand">
        <img src="./assets/logo.png?v=3" alt="Equilibrio" class="brand-logo">
        <h1>Equilibrio</h1>
        <p>Compartir la carga. Cuidar la familia.</p>
      </div>

      <div class="login-card">
        <h2>¿Quién eres?</h2>

        <button class="primary-btn" onclick="setUser('Rom')">
          Rom
        </button>

        <button class="secondary-btn" onclick="setUser('Carol')">
          Carol
        </button>
      </div>
    </section>

    <section id="screen-home" class="screen">
      <header class="topbar">
        <div>
          <p class="eyebrow">Buenos días</p>
          <h2 id="helloName">Rom</h2>
        </div>

    <img src="./assets/logo.png?v=3" alt="Equilibrio" class="top-logo">
      </header>

      <section class="balance-card">
        <p class="eyebrow">Equilibrio de hoy</p>
        <div id="balanceScore" class="score">100</div>
        <p id="balanceText" class="balance-text">Excelente equilibrio</p>

        <div class="bars">
          <div>
            <span>Rom</span>
            <div class="bar"><div id="romBar"></div></div>
            <small id="romPercent">50%</small>
          </div>

          <div>
            <span>Carol</span>
            <div class="bar"><div id="carolBar"></div></div>
            <small id="carolPercent">50%</small>
          </div>
        </div>
      </section>

      <section class="categories-grid">
        <button class="category-card" onclick="openNewTask('Phoenix')">
          <span>👶</span>
          <strong>Phoenix</strong>
        </button>

        <button class="category-card" onclick="openNewTask('Casa')">
          <span>🏠</span>
          <strong>Casa</strong>
        </button>

        <button class="category-card" onclick="openNewTask('Perro')">
          <span>🐶</span>
          <strong>Perro</strong>
        </button>

        <button class="category-card" onclick="openNewTask('Pareja')">
          <span>❤️</span>
          <strong>Pareja</strong>
        </button>
      </section>

      <section class="week-card">
        <div class="section-title">
          <h3>Esta semana</h3>
          <span id="weekSummary">0 tareas</span>
        </div>

        <div class="week-row">
          <div>
            <strong id="weekRom">0</strong>
            <span>Rom</span>
          </div>

          <div>
            <strong id="weekCarol">0</strong>
            <span>Carol</span>
          </div>
        </div>
      </section>

      <section class="tasks-card">
        <div class="section-title">
          <h3>Tareas de hoy</h3>
          <button class="small-add-btn" onclick="openNewTask()">＋</button>
        </div>

        <div id="taskList" class="task-list"></div>
      </section>
    </section>

    <div id="taskModal" class="modal hidden">
      <div class="modal-panel">
        <button class="close-btn" onclick="closeNewTask()">×</button>

        <h3>Nueva tarea</h3>

        <label>Categoría</label>
        <select id="taskCategory">
          <option>Phoenix</option>
          <option>Casa</option>
          <option>Perro</option>
          <option>Pareja</option>
        </select>

        <label>Descripción</label>
        <input id="taskText" type="text" placeholder="Ej: Cambiar pañal" />

        <label>¿Quién la hizo?</label>
        <div class="person-row">
          <button id="personRom" onclick="selectPerson('Rom')">Rom</button>
          <button id="personCarol" onclick="selectPerson('Carol')">Carol</button>
        </div>

        <button class="primary-btn full" onclick="saveTask()">
          Guardar tarea
        </button>
      </div>
    </div>

    <nav class="bottom-nav">
      <button class="nav-active">Inicio</button>
      <button onclick="openNewTask()">＋</button>
      <button onclick="resetApp()">Ajustes</button>
    </nav>

  </main>

  <script src="./app.js?v=2"></script>
</body>
</html>
