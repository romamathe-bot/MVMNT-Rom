<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equilibrio</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/logo.png">

</head>

<body>

<div class="app">

    <header class="header">

        <div class="logo">
            <img src="assets/logo.svg" alt="Equilibrio">
        </div>

        <h1>Equilibrio</h1>

        <p>Compartir la carga.<br>Disfrutar la vida.</p>

    </header>


    <section class="welcome">

        <h2>☀️ Buenos días Rom</h2>

        <div class="score">

            <span id="score">92</span>

            <small>Excelente equilibrio</small>

        </div>

    </section>


    <section class="categories">

        <button class="card" onclick="selectCategory('Phoenix')">
            👶
            <span>Phoenix</span>
        </button>

        <button class="card" onclick="selectCategory('Casa')">
            🏠
            <span>Casa</span>
        </button>

        <button class="card" onclick="selectCategory('Perro')">
            🐶
            <span>Perro</span>
        </button>

        <button class="card" onclick="selectCategory('Pareja')">
            ❤️
            <span>Pareja</span>
        </button>

    </section>


    <section class="tasks">

        <div class="title">

            <h3>Tareas</h3>

            <button onclick="newTask()">
                ＋
            </button>

        </div>

        <div id="taskList">

            <p class="empty">
                Todavía no hay tareas.
            </p>

        </div>

    </section>

</div>

<script src="app.js"></script>

</body>
</html>
